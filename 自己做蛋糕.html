<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎂 自己做蛋糕</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        body { background: #fefefb; font-family: 'ZCOOL KuaiLe', 'KaiTi', 'PingFang SC', cursive, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; touch-action: manipulation; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%; max-width: 620px; }
        .title { font-size: 1.8em; font-weight: bold; color: #000; letter-spacing: 0.06em; text-align: center; margin-bottom: 2px; animation: wobble 3s ease-in-out infinite; }
        @keyframes wobble { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(1.5deg); } 75% { transform: rotate(-1.5deg); } }
        .canvas-wrapper { width: 100%; max-width: 600px; aspect-ratio: 600 / 460; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 3px solid #000; overflow: hidden; position: relative; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; min-height: 42px; }
        .btn { font-family: inherit; font-size: 1em; padding: 8px 18px; border-radius: 30px; border: 3px solid #000; background: #fffdf8; color: #000; cursor: pointer; font-weight: bold; letter-spacing: 0.04em; transition: all 0.2s; box-shadow: 3px 3px 0 #000; white-space: nowrap; animation: wobble 2.5s ease-in-out infinite; }
        .btn:active { background: #f0e8d8; transform: scale(0.94); box-shadow: 1px 1px 0 #000; }
        .flavor-btn { min-width: 55px; animation: wobble 3.2s ease-in-out infinite; }
        .flavor-chocolate { background: #fdf3e7; } .flavor-toothpaste { background: #eaf6fd; } .flavor-sock { background: #f5f0fa; }
        .flavor-blueberry { background: #f4f0f8; } .flavor-spicy { background: #fdedec; } .flavor-cilantro { background: #f2f7e8; }
        .hidden { display: none !important; }
        @media (max-width: 480px) { .btn { font-size: 0.8em; padding: 7px 14px; } .title { font-size: 1.3em; } }
    </style>
</head>
<body>
<div class="container">
    <div class="title">🎂 自己做蛋糕 🎂</div>
    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="mainCanvas"></canvas>
    </div>
    <div class="btn-row hidden" id="flavorRowCream">
        <span style="color:#000;font-size:1em;">🎨 选奶油：</span>
        <button class="btn flavor-btn flavor-chocolate" data-cream="chocolate">🍫巧克力</button>
        <button class="btn flavor-btn flavor-toothpaste" data-cream="toothpaste">🪥牙膏</button>
        <button class="btn flavor-btn flavor-sock" data-cream="sock">🧦袜子</button>
    </div>
    <div class="btn-row hidden" id="flavorRowJam">
        <span style="color:#000;font-size:1em;">🍯 选果酱：</span>
        <button class="btn flavor-btn flavor-blueberry" data-jam="blueberry">🫐蓝莓</button>
        <button class="btn flavor-btn flavor-spicy" data-jam="spicy">🌶️辣条</button>
        <button class="btn flavor-btn flavor-cilantro" data-jam="cilantro">🌿香菜</button>
    </div>
    <div class="btn-row hidden" id="restartRow">
        <button class="btn" id="btnRestart">🔄 再做一次</button>
    </div>
</div>

<script>
(function() {
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvasWrapper');
    const W = 600, H = 460;
    let scale = 1;

    function resizeCanvas() {
        const rect = wrapper.getBoundingClientRect();
        const cssW = rect.width, cssH = rect.height;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = cssW * dpr; canvas.height = cssH * dpr;
        canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
        scale = cssW / W;
        ctx.setTransform(1,0,0,1,0,0);
        ctx.scale(dpr * scale, dpr * scale);
    }
    window.addEventListener('resize', resizeCanvas);

    const img = {};
    const imageFiles = {
        bg: 'bg.png', table: 'table.png',
        egg: 'egg.png', eggBlink: 'egg_blink.png', eggCracked: 'egg_cracked.png', eggWhiteYolk: 'egg_white_yolk.png',
        bowl: 'bowl.png', flourBag: 'flour_bag.png', spoon: 'spoon.png',
        mold: 'mold.png', moldBatter: 'mold_with_batter.png',
        ovenClosed: 'oven_closed.png', ovenOpen: 'oven_open.png', moldInOven: 'mold_in_oven.png',
        cakeBase: 'cake_base.png',
        creamChocolate: 'cream_chocolate.png', creamToothpaste: 'cream_toothpaste.png', creamSock: 'cream_sock.png',
        jamBlueberry: 'jam_blueberry.png', jamSpicy: 'jam_spicy.png', jamCilantro: 'jam_cilantro.png',
        cakePerfect: 'cake_perfect.png', candle: 'candle.png'
    };
    for (const [key, src] of Object.entries(imageFiles)) { img[key] = new Image(); img[key].src = src; }

    // ========== 音频系统 ==========
    let audioCtx = null;
    let musicStarted = false;
    const sfx = {};
    let ovenHumInstance = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext||window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();

        // 真实音效：鸡蛋碎裂
        if (!sfx.crack) {
            const crackAudio = new Audio('crack.mp3');
            crackAudio.preload = 'auto';
            crackAudio.volume = 0.7;
            sfx.crack = crackAudio;
        }

        // 背景音乐（只创建一次）
        if (!sfx.bgm) {
            const bgm = new Audio('bgm.mp3');
            bgm.loop = true;
            bgm.volume = 0.4;
            sfx.bgm = bgm;
        }

        // 合成音效（只注册一次）
        if (!sfx.flour) {
            const synth = (name, fn) => { sfx[name] = { play: fn }; };

            synth('flour', () => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            });

            synth('stir', () => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(250 + Math.random() * 150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            });

            synth('ovenIn', () => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            });

            synth('ovenHum', () => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start();
                return { stop: () => { gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2); osc.stop(audioCtx.currentTime + 0.2); } };
            });

            synth('click', () => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            });

            synth('cheer', () => {
                for (let i=0; i<8; i++) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(300 + i*60, audioCtx.currentTime + i*0.08);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i*0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + i*0.08);
                    osc.stop(audioCtx.currentTime + 1.0);
                }
                const bufferSize = audioCtx.sampleRate * 1.5;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) data[i] = (Math.random()*2-1) * Math.exp(-i/(audioCtx.sampleRate*0.5));
                const source = audioCtx.createBufferSource(); source.buffer = buffer;
                const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+1.5);
                source.connect(gain); gain.connect(audioCtx.destination);
                source.start(); source.stop(audioCtx.currentTime+1.5);
            });

            // 倒面糊音效（流畅的液体声）
            synth('pour', () => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.8);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 1.0);
            });
        }

        // 启动背景音乐（仅在首次用户交互后）
        if (sfx.bgm && !musicStarted) {
            sfx.bgm.play().catch(() => {});
            musicStarted = true;
        }
    }

    function playSFX(key) {
        if (sfx[key]) {
            const s = sfx[key];
            if (s instanceof Audio) {
                s.currentTime = 0;
                s.play().catch(() => {});
            } else if (s.play) {
                const instance = s.play();
                if (key === 'ovenHum') ovenHumInstance = instance;
            }
        }
    }

    function stopOvenHum() {
        if (ovenHumInstance && ovenHumInstance.stop) {
            ovenHumInstance.stop();
            ovenHumInstance = null;
        }
    }

    // ========== 游戏状态 ==========
    const STATE = { EGG:0, FLOUR:1, STIR:2, POUR:3, OVEN:4, CAKE_OUT:5, CREAM:6, JAM:7, JAM_DISPLAY:8, FINAL:9 };
    let currentStep = STATE.EGG;
    let selectedCream = null, selectedJam = null;
    let dragTarget = null, dragOffsetX = 0, dragOffsetY = 0;

    const bowlPos = { x: 300, y: 340, r: 100 };
    let egg1Pos = { x: 150, y: 120 }, egg2Pos = { x: 450, y: 120 };
    let egg1Vel = { vx: 2.0, vy: 1.5 }, egg2Vel = { vx: -1.8, vy: 1.3 };
    let egg1InBowl = false, egg2InBowl = false;
    let egg1Cracking = false, egg2Cracking = false;
    let flourPos = { x: 460, y: 160 };
    let flourPourTimer = 0;
    let spoonPos = { x: 460, y: 270 };
    let stirProgress = 0, stirComplete = false, totalStirAngle = 0, lastStirAngle = null;
    let animTime = 0, blinkTimer = 0, blinkEgg = false;

    let pourProgress = 0;
    let bowlPourX = bowlPos.x, bowlPourY = bowlPos.y, bowlPourAngle = 0;
    let ovenSubStep = 0, ovenProgress = 0, ovenOpenAnim = 0;
    let jamDropProgress = 0, jamDisplayTimer = 0;
    let cakeOutProgress = 0, finalReveal = 0;
    let particles = [];
    let fireworks = [];
    let steamParticles = [];

    let creamSpread = 0;
    let jamTwist = 0;

    function spawnParticles(x,y,count,color='#ffffff',spread=60,life=1.5) {
        for(let i=0;i<count;i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * spread;
            particles.push({ x, y, vx: Math.cos(angle) * speed * 1.5, vy: Math.sin(angle) * speed * 1.2 - Math.random() * 40, life, maxLife: life, color, size: 3 + Math.random() * 7 });
        }
    }
    function createFirework(x, y) {
        const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#f06595','#845ef7','#20c997'];
        for (let i = 0; i < 30; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 5;
            fireworks.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 0.8+Math.random()*1.5, maxLife: 1.5+Math.random()*2, color: colors[Math.floor(Math.random()*colors.length)], size: 2+Math.random()*5 });
        }
    }
    function updateParticles(dt) {
        for(let i=particles.length-1;i>=0;i--) { const p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 80 * dt; p.life -= dt; if(p.life <= 0) particles.splice(i,1); }
        for(let i=fireworks.length-1;i>=0;i--) { const f = fireworks[i]; f.x += f.vx * dt; f.y += f.vy * dt; f.vy += 60 * dt; f.life -= dt; if(f.life <= 0) fireworks.splice(i,1); }
        for(let i=steamParticles.length-1;i>=0;i--) { const s = steamParticles[i]; s.x += s.vx * dt; s.y += s.vy * dt; s.vy -= 30 * dt; s.life -= dt; if(s.life <= 0) steamParticles.splice(i,1); }
    }
    function drawParticles() {
        particles.forEach(p=>{ const alpha=Math.max(0,p.life/p.maxLife); const hex=p.color, r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16); ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2); ctx.fill(); });
        fireworks.forEach(f=>{ const alpha=Math.max(0,f.life/f.maxLife); ctx.fillStyle=f.color.replace(')',`, ${alpha})`).replace('rgb','rgba'); ctx.beginPath(); ctx.arc(f.x,f.y,f.size*alpha,0,Math.PI*2); ctx.fill(); });
        steamParticles.forEach(s=>{ const alpha=Math.max(0,s.life/s.maxLife)*0.4; ctx.fillStyle=`rgba(255,255,255,${alpha})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill(); });
        ctx.globalAlpha = 1;
    }

    function drawShadow(x, y, w, h) { ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.beginPath(); ctx.ellipse(x,y,w*0.5,h*0.15,0,0,Math.PI*2); ctx.fill(); }

    function drawBubbleText(text, x, y, fontSize) {
        ctx.font = `bold ${fontSize}px "ZCOOL KuaiLe", "KaiTi", cursive`;
        const metrics = ctx.measureText(text);
        const tw = metrics.width, th = fontSize;
        const padding = 16;
        const bx = x - tw/2 - padding, by = y - th/2 - padding, bw = tw + padding*2, bh = th + padding*2;
        const radius = 20;
        ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(bx + radius, by); ctx.lineTo(bx + bw - radius, by); ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + radius);
        ctx.lineTo(bx + bw, by + bh - radius); ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - radius, by + bh);
        ctx.lineTo(bx + radius, by + bh); ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - radius);
        ctx.lineTo(bx, by + radius); ctx.quadraticCurveTo(bx, by, bx + radius, by);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x - 12, by + bh); ctx.lineTo(x, by + bh + 14); ctx.lineTo(x + 12, by + bh);
        ctx.fillStyle = '#ffffff'; ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const letterSpacing = 4; let totalWidth = 0; const charWidths = [];
        for (let i = 0; i < text.length; i++) { const cw = ctx.measureText(text[i]).width + letterSpacing; charWidths.push(cw); totalWidth += cw; }
        totalWidth -= letterSpacing;
        let currentX = x - totalWidth / 2;
        for (let i = 0; i < text.length; i++) {
            const char = text[i], cw = ctx.measureText(char).width;
            const ox = Math.sin(animTime * 8 + i * 1.5) * 1.5, oy = Math.cos(animTime * 9 + i * 2.0) * 1.0;
            ctx.fillText(char, currentX + cw/2 + ox, y + oy); currentX += charWidths[i];
        }
        ctx.textBaseline = 'alphabetic';
    }

    function isInBowl(px,py) { const dx=px-bowlPos.x, dy=py-bowlPos.y; return Math.sqrt(dx*dx+dy*dy) < bowlPos.r*0.85; }
    function getEventPos(e) { const rect=canvas.getBoundingClientRect(); const cx=e.touches?e.touches[0].clientX:e.clientX; const cy=e.touches?e.touches[0].clientY:e.clientY; return {x:(cx-rect.left)/scale, y:(cy-rect.top)/scale}; }
    function isOvenClick(pos) { const ox=120,oy=140,ow=360,oh=300; return pos.x>ox&&pos.x<ox+ow&&pos.y>oy&&pos.y<oy+oh; }

    // 事件处理：首次触摸时启动音频和背景音乐
    function onFirstTouch() {
        initAudio();
        canvas.removeEventListener('touchstart', onFirstTouch);
        canvas.removeEventListener('mousedown', onFirstTouch);
    }
    canvas.addEventListener('touchstart', onFirstTouch, { passive: false });
    canvas.addEventListener('mousedown', onFirstTouch);

    function onPointerDown(e) {
        e.preventDefault();
        if (!musicStarted) initAudio(); // 确保音频已启动
        const pos = getEventPos(e);
        if (currentStep === STATE.OVEN && ovenSubStep === 0 && isOvenClick(pos)) { ovenSubStep = 1; ovenOpenAnim = 0; playSFX('ovenIn'); return; }
        if (currentStep > STATE.STIR) return;
        if (currentStep === STATE.EGG) {
            if (!egg1InBowl && Math.hypot(pos.x-egg1Pos.x, pos.y-egg1Pos.y) < 45) { dragTarget='egg1'; dragOffsetX=egg1Pos.x-pos.x; dragOffsetY=egg1Pos.y-pos.y; return; }
            if (!egg2InBowl && Math.hypot(pos.x-egg2Pos.x, pos.y-egg2Pos.y) < 45) { dragTarget='egg2'; dragOffsetX=egg2Pos.x-pos.x; dragOffsetY=egg2Pos.y-pos.y; return; }
        } else if (currentStep === STATE.FLOUR && Math.abs(pos.x-flourPos.x)<45 && Math.abs(pos.y-flourPos.y)<50) { dragTarget='flour'; dragOffsetX=flourPos.x-pos.x; dragOffsetY=flourPos.y-pos.y; flourPourTimer = 0; }
        else if (currentStep === STATE.STIR && !stirComplete && Math.hypot(pos.x-spoonPos.x, pos.y-spoonPos.y)<35) { dragTarget='spoon'; dragOffsetX=spoonPos.x-pos.x; dragOffsetY=spoonPos.y-pos.y; }
    }

    function onPointerMove(e) {
        if (!dragTarget) return; e.preventDefault();
        const pos = getEventPos(e);
        let nx = pos.x + dragOffsetX, ny = pos.y + dragOffsetY;
        if (dragTarget === 'egg1') {
            egg1Pos.x = nx; egg1Pos.y = ny;
            if (isInBowl(nx, ny)) {
                egg1InBowl = true; egg1Cracking = true; dragTarget = null;
                spawnParticles(bowlPos.x, bowlPos.y-30, 40, '#ffd700', 80, 1.5); spawnParticles(bowlPos.x, bowlPos.y-30, 20, '#ffffff', 60, 1.2);
                playSFX('crack');
                setTimeout(() => { egg1Cracking = false; }, 400);
                if (egg1InBowl && egg2InBowl) { currentStep = STATE.FLOUR; flourPos = { x: 460, y: 160 }; flourPourTimer = 0; }
            }
        } else if (dragTarget === 'egg2') {
            egg2Pos.x = nx; egg2Pos.y = ny;
            if (isInBowl(nx, ny)) {
                egg2InBowl = true; egg2Cracking = true; dragTarget = null;
                spawnParticles(bowlPos.x, bowlPos.y-30, 40, '#ffd700', 80, 1.5); spawnParticles(bowlPos.x, bowlPos.y-30, 20, '#ffffff', 60, 1.2);
                playSFX('crack');
                setTimeout(() => { egg2Cracking = false; }, 400);
                if (egg1InBowl && egg2InBowl) { currentStep = STATE.FLOUR; flourPos = { x: 460, y: 160 }; flourPourTimer = 0; }
            }
        } else if (dragTarget === 'flour') {
            flourPos.x = nx; flourPos.y = ny;
            if (isInBowl(nx, ny)) {
                flourPourTimer += 0.016;
                if (flourPourTimer > 0.5) {
                    dragTarget = null;
                    spawnParticles(bowlPos.x, bowlPos.y-30, 50, '#f5e8d0', 90, 2.0); spawnParticles(bowlPos.x, bowlPos.y-30, 25, '#ffffff', 70, 1.5);
                    playSFX('flour');
                    currentStep = STATE.STIR; spoonPos = { x: 460, y: 270 }; stirProgress = 0; totalStirAngle = 0; lastStirAngle = null; stirComplete = false;
                }
            }
        } else if (dragTarget === 'spoon') {
            spoonPos.x = nx; spoonPos.y = ny;
            if (isInBowl(nx, ny) && !stirComplete) {
                const dx = nx - bowlPos.x, dy = ny - bowlPos.y, angle = Math.atan2(dy, dx);
                if (lastStirAngle !== null) {
                    let delta = angle - lastStirAngle; if (delta > Math.PI) delta -= 2*Math.PI; if (delta < -Math.PI) delta += 2*Math.PI;
                    totalStirAngle += Math.abs(delta);
                    if (Math.abs(delta) > 0.05) { playSFX('stir'); spawnParticles(spoonPos.x, spoonPos.y, 2, '#f9e8c8', 25, 0.6); }
                }
                lastStirAngle = angle;
                stirProgress = Math.min(1, totalStirAngle / (Math.PI * 4));
                if (stirProgress >= 1 && !stirComplete) {
                    stirComplete = true;
                    spawnParticles(bowlPos.x, bowlPos.y-30, 30, '#f9e8c8', 60, 1.5); spawnParticles(bowlPos.x, bowlPos.y-30, 20, '#ffd700', 50, 1.2);
                    setTimeout(() => { currentStep = STATE.POUR; pourProgress = 0; bowlPourX = bowlPos.x; bowlPourY = bowlPos.y; bowlPourAngle = 0; playSFX('pour'); }, 600);
                }
            }
        }
    }

    function onPointerUp(e) {
        if (dragTarget === 'egg1' && !egg1InBowl) egg1Pos = { x: 150, y: 120 };
        if (dragTarget === 'egg2' && !egg2InBowl) egg2Pos = { x: 450, y: 120 };
        if (dragTarget === 'flour' && !isInBowl(flourPos.x, flourPos.y)) flourPos = { x: 460, y: 160 };
        dragTarget = null;
    }

    canvas.addEventListener('mousedown', onPointerDown); canvas.addEventListener('mousemove', onPointerMove); canvas.addEventListener('mouseup', onPointerUp); canvas.addEventListener('mouseleave', onPointerUp);
    canvas.addEventListener('touchstart', onPointerDown, { passive: false }); canvas.addEventListener('touchmove', onPointerMove, { passive: false }); canvas.addEventListener('touchend', onPointerUp); canvas.addEventListener('touchcancel', onPointerUp);

    document.querySelectorAll('#flavorRowCream .flavor-btn').forEach(btn => { btn.addEventListener('click', () => { selectedCream = btn.dataset.cream; playSFX('click'); spawnParticles(300, 320, 25, '#ffffff', 50, 1.2); spawnParticles(300, 320, 15, getCreamColor(), 50, 1.5); currentStep = STATE.JAM; jamDropProgress = 0; creamSpread = 0; document.getElementById('flavorRowCream').classList.add('hidden'); document.getElementById('flavorRowJam').classList.remove('hidden'); }); });
    document.querySelectorAll('#flavorRowJam .flavor-btn').forEach(btn => { btn.addEventListener('click', () => { selectedJam = btn.dataset.jam; playSFX('click'); spawnParticles(300, 300, 25, '#ffffff', 50, 1.2); spawnParticles(300, 300, 15, getJamColor(), 50, 1.5); currentStep = STATE.JAM_DISPLAY; jamDisplayTimer = 1.5; jamTwist = 0; document.getElementById('flavorRowJam').classList.add('hidden'); }); });
    document.getElementById('btnRestart').addEventListener('click', () => {
        currentStep = STATE.EGG; selectedCream = null; selectedJam = null;
        egg1Pos = { x: 150, y: 120 }; egg2Pos = { x: 450, y: 120 }; egg1InBowl = false; egg2InBowl = false; egg1Cracking = false; egg2Cracking = false;
        flourPos = { x: 460, y: 160 }; flourPourTimer = 0; spoonPos = { x: 460, y: 270 }; stirProgress = 0; stirComplete = false;
        pourProgress = 0; ovenProgress = 0; ovenSubStep = 0; ovenOpenAnim = 0; cakeOutProgress = 0; finalReveal = 0; jamDropProgress = 0; jamDisplayTimer = 0;
        bowlPourX = bowlPos.x; bowlPourY = bowlPos.y; bowlPourAngle = 0;
        particles = []; fireworks = []; steamParticles = [];
        stopOvenHum();
        document.getElementById('flavorRowCream').classList.add('hidden'); document.getElementById('flavorRowJam').classList.add('hidden'); document.getElementById('restartRow').classList.add('hidden');
        // 重开时确保背景音乐继续播放（如果已经在播）
        if (sfx.bgm && musicStarted) {
            sfx.bgm.currentTime = 0;
            sfx.bgm.play().catch(() => {});
        }
    });

    function getCreamColor() { if (selectedCream === 'chocolate') return '#c4956a'; if (selectedCream === 'toothpaste') return '#8ccbf5'; if (selectedCream === 'sock') return '#f5a9a8'; return '#ffffff'; }
    function getJamColor() { if (selectedJam === 'blueberry') return '#9b7ec4'; if (selectedJam === 'spicy') return '#e8533f'; if (selectedJam === 'cilantro') return '#c5d8a0'; return '#ffffff'; }
    function getCreamImg() { if (selectedCream === 'chocolate') return img.creamChocolate; if (selectedCream === 'toothpaste') return img.creamToothpaste; if (selectedCream === 'sock') return img.creamSock; return null; }
    function getJamImg() { if (selectedJam === 'blueberry') return img.jamBlueberry; if (selectedJam === 'spicy') return img.jamSpicy; if (selectedJam === 'cilantro') return img.jamCilantro; return null; }

    function drawScene() {
        ctx.clearRect(0, 0, W, H);
        if (img.bg && img.bg.complete && img.bg.naturalWidth > 0) ctx.drawImage(img.bg, 0, 0, W, H);
        else { ctx.fillStyle = '#fdfaf5'; ctx.fillRect(0, 0, W, H); }
        if (img.table && img.table.complete && img.table.naturalWidth > 0) ctx.drawImage(img.table, 0, 320, 600, 140);

        if (currentStep <= STATE.STIR) drawShadow(bowlPos.x, bowlPos.y+60, 180, 30);
        if (currentStep === STATE.POUR) drawShadow(bowlPourX, bowlPourY+60, 150, 25);
        if (currentStep === STATE.CAKE_OUT || currentStep === STATE.CREAM || currentStep === STATE.JAM || currentStep === STATE.JAM_DISPLAY || currentStep === STATE.FINAL) {
            if (currentStep === STATE.FINAL) drawShadow(300, 370, 200, 40);
            else drawShadow(300, 360, 200, 40);
        }

        if (currentStep === STATE.EGG && (!egg1InBowl || !egg2InBowl)) drawBubbleText('拖动鸡蛋到碗里', W/2, 75, 22);
        else if (currentStep === STATE.FLOUR && dragTarget !== 'flour') drawBubbleText('按住面粉袋放入碗中', W/2, 70, 22);
        else if (currentStep === STATE.STIR && !stirComplete) drawBubbleText('拖动勺子在碗里画圈', W/2, 70, 22);
        else if (currentStep === STATE.POUR) drawBubbleText('正在倒入模具...', W/2, 70, 22);
        else if (currentStep === STATE.OVEN && ovenSubStep === 0) drawBubbleText('点击烤箱放入蛋糕', W/2, 65, 22);
        else if (currentStep === STATE.OVEN && ovenSubStep >= 1) drawBubbleText('烘烤中...好香呀~', W/2, 65, 22);

        if (currentStep <= STATE.STIR) {
            if (img.bowl && img.bowl.complete && img.bowl.naturalWidth > 0) ctx.drawImage(img.bowl, bowlPos.x - 100, bowlPos.y - 100, 200, 200);
        } else if (currentStep === STATE.POUR) {
            ctx.save(); ctx.translate(bowlPourX, bowlPourY); ctx.rotate(bowlPourAngle);
            if (img.bowl && img.bowl.complete && img.bowl.naturalWidth > 0) ctx.drawImage(img.bowl, -85, -85, 170, 170);
            ctx.restore();
        }

        if (currentStep === STATE.EGG) {
            if (!egg1InBowl) { const e = (blinkEgg && img.eggBlink && img.eggBlink.naturalWidth>0) ? img.eggBlink : img.egg; if (e && e.complete) { ctx.save(); ctx.translate(egg1Pos.x, egg1Pos.y); ctx.rotate(Math.sin(animTime*3)*0.2); ctx.drawImage(e, -45, -55, 90, 110); ctx.restore(); } }
            if (!egg2InBowl) { const e = (blinkEgg && img.eggBlink && img.eggBlink.naturalWidth>0) ? img.eggBlink : img.egg; if (e && e.complete) { ctx.save(); ctx.translate(egg2Pos.x, egg2Pos.y); ctx.rotate(Math.cos(animTime*3.5)*0.2); ctx.drawImage(e, -45, -55, 90, 110); ctx.restore(); } }
        }

        if ((egg1InBowl || egg2InBowl) && currentStep <= STATE.STIR) {
            if (img.eggWhiteYolk && img.eggWhiteYolk.complete && img.eggWhiteYolk.naturalWidth > 0) {
                if (egg1InBowl && !egg1Cracking) ctx.drawImage(img.eggWhiteYolk, bowlPos.x-65, bowlPos.y-35, 90, 60);
                if (egg2InBowl && !egg2Cracking) ctx.drawImage(img.eggWhiteYolk, bowlPos.x+5, bowlPos.y-35, 90, 60);
            }
            if (egg1Cracking && img.eggCracked && img.eggCracked.complete) ctx.drawImage(img.eggCracked, bowlPos.x-60, bowlPos.y-150, 90, 100);
            if (egg2Cracking && img.eggCracked && img.eggCracked.complete) ctx.drawImage(img.eggCracked, bowlPos.x+10, bowlPos.y-150, 90, 100);
        }

        if (currentStep === STATE.FLOUR && img.flourBag && img.flourBag.complete && img.flourBag.naturalWidth > 0) {
            const tilt = dragTarget === 'flour' ? -0.4 : 0;
            ctx.save(); ctx.translate(flourPos.x, flourPos.y); ctx.rotate(tilt); ctx.drawImage(img.flourBag, -50, -65, 100, 130); ctx.restore();
        }

        // 面糊
        if (currentStep >= STATE.STIR && currentStep <= STATE.POUR) {
            let ex = bowlPos.x, ey = bowlPos.y - 15;
            if (currentStep === STATE.POUR) { ex = bowlPourX; ey = bowlPourY - 15; }
            ctx.save();
            if (currentStep === STATE.STIR && stirProgress > 0) {
                ctx.translate(ex, ey); ctx.rotate(lastStirAngle || 0);
                ctx.fillStyle = 'rgba(255, 248, 200, 0.85)'; ctx.beginPath(); ctx.arc(0, 0, 50, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'rgba(220, 200, 120, 0.6)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-25, 0); ctx.quadraticCurveTo(0, -18, 25, 0); ctx.stroke();
            } else {
                ctx.fillStyle = 'rgba(255, 248, 200, 0.85)'; ctx.beginPath(); ctx.arc(ex, ey, 50, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }

        if (currentStep === STATE.STIR && img.spoon && img.spoon.complete && img.spoon.naturalWidth > 0) {
            ctx.save(); ctx.translate(spoonPos.x, spoonPos.y); ctx.rotate(0.25); ctx.drawImage(img.spoon, -30, -75, 60, 150); ctx.restore();
        }

        if (currentStep === STATE.POUR) {
            const moldX = 420, moldY = 340;
            if (pourProgress > 0.1 && pourProgress < 0.9) {
                const sx = bowlPourX + Math.sin(bowlPourAngle)*65, sy = bowlPourY - Math.cos(bowlPourAngle)*55;
                ctx.strokeStyle = '#f9e8c8'; ctx.lineWidth = 20; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(sx, sy); ctx.quadraticCurveTo((sx+moldX)/2, sy-60, moldX, moldY-25); ctx.stroke();
                if (Math.random() < 0.8) spawnParticles(moldX, moldY-20, 3, '#f9e8c8', 40, 1.0);
            }
            const mi = pourProgress > 0.4 ? img.moldBatter : img.mold;
            if (mi && mi.complete && mi.naturalWidth > 0) ctx.drawImage(mi, moldX-85, moldY-50, 170, 110);
        }

        if (currentStep === STATE.OVEN) {
            const ox = 120, oy = 140, ow = 360, oh = 300;
            if (ovenSubStep === 0) {
                if (img.ovenClosed && img.ovenClosed.complete) ctx.drawImage(img.ovenClosed, ox, oy, ow, oh);
                ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4; ctx.setLineDash([10, 10]); ctx.strokeRect(ox, oy, ow, oh); ctx.setLineDash([]);
            } else if (ovenSubStep === 1) {
                if (img.ovenOpen && img.ovenOpen.complete) ctx.drawImage(img.ovenOpen, ox, oy, ow, oh);
                if (Math.random() < 0.6) steamParticles.push({ x: ox+ow/2+Math.random()*50-25, y: oy+30, vx: (Math.random()-0.5)*20, vy: -Math.random()*60, life: 1.5+Math.random(), size: 15+Math.random()*25 });
                const p = Math.min(1, ovenOpenAnim);
                if (img.moldBatter && img.moldBatter.complete) { ctx.globalAlpha = p; ctx.drawImage(img.moldBatter, ox+ow/2-85, oy+oh/2-50, 170, 110); ctx.globalAlpha=1; }
            } else {
                if (img.moldInOven && img.moldInOven.complete) ctx.drawImage(img.moldInOven, ox, oy, ow, oh);
                const barW = ow-60;
                const grad = ctx.createLinearGradient(ox+30, oy-20, ox+30+barW, oy-20);
                grad.addColorStop(0,'#ff6b6b'); grad.addColorStop(0.25,'#ffd93d'); grad.addColorStop(0.5,'#6bcb77'); grad.addColorStop(0.75,'#4d96ff'); grad.addColorStop(1,'#ff922b');
                ctx.fillStyle = grad; ctx.fillRect(ox+30, oy-25, barW * Math.min(1, ovenProgress), 10);
            }
        }

        if (currentStep === STATE.CAKE_OUT && img.cakeBase && img.cakeBase.complete && img.cakeBase.naturalWidth > 0) {
            const cx = 300 - (1 - cakeOutProgress) * 150;
            ctx.drawImage(img.cakeBase, cx - 130, 270, 260, 150);
        }

        if (currentStep === STATE.CREAM || currentStep === STATE.JAM || currentStep === STATE.JAM_DISPLAY) {
            if (img.cakeBase && img.cakeBase.complete) ctx.drawImage(img.cakeBase, 170, 270, 260, 150);
            const ci = getCreamImg(); if (ci && ci.complete) { creamSpread = Math.min(1, creamSpread + 0.02); ctx.save(); ctx.beginPath(); ctx.rect(170, 265, 260 * creamSpread, 150); ctx.clip(); ctx.drawImage(ci, 170, 265, 260, 150); ctx.restore(); }
            if ((currentStep === STATE.JAM || currentStep === STATE.JAM_DISPLAY) && selectedJam) {
                const ji = getJamImg(); if (ji && ji.complete) {
                    if (currentStep === STATE.JAM) { jamDropProgress = Math.min(1, jamDropProgress + 0.02); const ty = 285, sy = 150; ctx.save(); ctx.translate(300, sy + (ty-sy)*jamDropProgress); ctx.rotate(jamTwist * 0.5); ctx.drawImage(ji, -110, -60, 220, 120); ctx.restore(); jamTwist += 0.1; }
                    else { ctx.drawImage(ji, 190, 285, 220, 120); }
                }
            }
        }

        if (currentStep === STATE.FINAL) {
            const rev = Math.min(1, finalReveal), cx=300, cy=290;
            ctx.save(); ctx.globalAlpha = Math.min(1, rev*1.2); ctx.translate(cx, cy); ctx.scale(0.3+0.7*rev, 0.3+0.7*rev);
            const isChocolateBlueberry = (selectedCream === 'chocolate' && selectedJam === 'blueberry');
            if (isChocolateBlueberry && img.cakePerfect && img.cakePerfect.complete) { ctx.drawImage(img.cakePerfect, -150, -110, 300, 220); }
            else {
                const cakeYOffset = 15;
                if (img.cakeBase && img.cakeBase.complete) ctx.drawImage(img.cakeBase, -130, -75 + cakeYOffset, 260, 150);
                const ci = getCreamImg(); if (ci && ci.complete) ctx.drawImage(ci, -130, -80 + cakeYOffset, 260, 150);
                const ji = getJamImg(); if (ji && ji.complete) ctx.drawImage(ji, -120, -75 + cakeYOffset, 240, 130);
                if (img.candle && img.candle.complete && img.candle.naturalWidth>0 && rev>0.6) { for(let i=-1;i<=1;i++) ctx.drawImage(img.candle, i*50-8, -85 + cakeYOffset, 20, 55); }
            }
            ctx.restore();
            if (rev > 0.8) {
                if (Math.random() < 0.35) { const fx = Math.random()<0.5 ? Math.random()*100 : W-Math.random()*100; createFirework(fx, Math.random()*100); }
                drawBubbleText('生日快乐！', cx, 125, 24);
                document.getElementById('restartRow').classList.remove('hidden');
            }
        }

        drawParticles();
    }

    function updateAutoSteps(dt) {
        if (currentStep === STATE.POUR) {
            pourProgress += dt * 0.45; const t = Math.min(1, pourProgress / 0.85);
            bowlPourX = bowlPos.x + (420 - bowlPos.x) * t; bowlPourY = bowlPos.y - 100 * Math.sin(t * Math.PI * 0.8) + (240 - bowlPos.y) * t; bowlPourAngle = 0.7 * Math.min(1, pourProgress / 0.4);
            if (pourProgress >= 1) { pourProgress = 1; currentStep = STATE.OVEN; ovenSubStep = 0; ovenProgress = 0; ovenOpenAnim = 0; playSFX('ovenIn'); }
        } else if (currentStep === STATE.OVEN) {
            if (ovenSubStep === 1) { ovenOpenAnim += dt * 1.5; if (ovenOpenAnim >= 1) { ovenOpenAnim = 1; ovenSubStep = 2; ovenProgress = 0; ovenHumInstance = sfx.ovenHum.play(); } }
            else if (ovenSubStep === 2) { ovenProgress += dt * 0.5; if (ovenProgress >= 1.0) { ovenProgress = 1.0; currentStep = STATE.CAKE_OUT; cakeOutProgress = 0; stopOvenHum(); } }
        } else if (currentStep === STATE.CAKE_OUT) { cakeOutProgress += dt * 0.8; if (cakeOutProgress >= 1) { cakeOutProgress = 1; currentStep = STATE.CREAM; document.getElementById('flavorRowCream').classList.remove('hidden'); } }
        else if (currentStep === STATE.JAM) { if (jamDropProgress < 1) jamDropProgress += dt * 2.5; }
        else if (currentStep === STATE.JAM_DISPLAY) { jamDisplayTimer -= dt; if (jamDisplayTimer <= 0) { currentStep = STATE.FINAL; finalReveal = 0; playSFX('cheer'); } }
        else if (currentStep === STATE.FINAL) { finalReveal += dt * 0.7; if (finalReveal > 1) finalReveal = 1; }
    }

    function updateEggMovement(dt) {
        if (currentStep === STATE.EGG) {
            if (!egg1InBowl && dragTarget!=='egg1') { egg1Pos.x += egg1Vel.vx*dt*60; egg1Pos.y += egg1Vel.vy*dt*60; if (egg1Pos.x<60||egg1Pos.x>540) { egg1Vel.vx*=-1; egg1Pos.x = Math.max(60,Math.min(540,egg1Pos.x)); } if (egg1Pos.y<80||egg1Pos.y>200) { egg1Vel.vy*=-1; egg1Pos.y = Math.max(80,Math.min(200,egg1Pos.y)); } }
            if (!egg2InBowl && dragTarget!=='egg2') { egg2Pos.x += egg2Vel.vx*dt*60; egg2Pos.y += egg2Vel.vy*dt*60; if (egg2Pos.x<60||egg2Pos.x>540) { egg2Vel.vx*=-1; egg2Pos.x = Math.max(60,Math.min(540,egg2Pos.x)); } if (egg2Pos.y<80||egg2Pos.y>200) { egg2Vel.vy*=-1; egg2Pos.y = Math.max(80,Math.min(200,egg2Pos.y)); } }
        }
    }

    let lastTime = performance.now();
    function animate(ts) {
        const dt = Math.min(0.05, (ts - lastTime)/1000 || 0.016); lastTime = ts; animTime += dt;
        blinkTimer += dt; if (blinkTimer > 2.5 + Math.random()*0.5) { blinkEgg = true; setTimeout(() => { blinkEgg = false; }, 120); blinkTimer = 0; }
        resizeCanvas();
        updateAutoSteps(dt);
        updateEggMovement(dt);
        updateParticles(dt);
        drawScene();
        requestAnimationFrame(animate);
    }
    resizeCanvas(); requestAnimationFrame(animate);
})();
</script>
</body>
